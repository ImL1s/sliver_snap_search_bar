name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        flutter: ['3.32.0', 'stable']
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ matrix.flutter }}
          channel: ${{ matrix.flutter == 'stable' && 'stable' || 'any' }}
      - run: flutter --version
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
